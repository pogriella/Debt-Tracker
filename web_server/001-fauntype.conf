<VirtualHost *:80>
   SetEnv LOCAL_DEV true
   SetEnv LOCAL_DEV_URL debt.local
   SetEnv fauntype_is_dev 1

   ServerAdmin fauntype@gmail.com
   DocumentRoot /var/www/
   ServerName debt.local
   ServerAlias *.debt.local
   AddHandler cgi-script .cgi .pl .py

   <Directory "/var/www">
        AllowOverride All
        Options ExecCGI FollowSymLinks
        AddHandler cgi-script .pl
		Require all granted
   </Directory>

   RewriteEngine On
   RewriteCond %{HTTP_HOST} ^((?!www\.).+).debt.local$
   RewriteRule ^.*$ /%1%{REQUEST_URI} [L]

   ErrorLog /var/www/debt_error.log
   CustomLog /var/www/debt_access.log common

</VirtualHost>
