version: "3.3"
services:
  web:
    build: ./web_server/
    ports:
      - 80:80
    volumes:
      - ./src/:/var/www
    extra_hosts:
      - "test.debt.track:127.0.0.1"

  db:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: thisisreal

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: thisisreal
      ME_CONFIG_MONGODB_URL: mongodb://root.thisisreal@mongo:27017/

  frontail:
    image: mthenw/frontail
    command: /var/www/debt_track_error.log
    ports:
      - 9001:9001
    volumes:
      - ./v6_src/:/var/www

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: debttrack_phpmyadmin
    environment:
     - PMA_ARBITRARY=1
    restart: always
    ports:
     - 8080:80
