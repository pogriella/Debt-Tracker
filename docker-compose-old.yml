version: "3.3"
services:
        web:
                build: ./web_server
                ports:
                        - 80:80
                volumes:
                        - ./src/:/var/www
                extra_hosts:
                        -"debt.track:127.0.0.1"
                
        db:
                image: mysql
                command: --default-authentication-plugin=mysql_native_password --sql_mode=""
                restart: always
                environment:
                        MYSQL_ROOT_PASSWORD: thisisreal
                volumes:
                        - ./mysql_data:/var/lib/mysql
                ports:
                        - 3306:3306
        
        frontail:
                image: mthenw/frontail
                command: /var/www/debt_track_error.log
                ports:
                        - 9001:9001
                volumes:
                        - ./src/:/var/www

        phpmyadmins:
                image: phpmyadmin/phpmyadmin
                container_name: phpmyadmin
                environment:
                        -PMA_ARBITRARY=1
                restart: always
                ports:
                        - 8080:80
